<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a2f4e"/>
    </linearGradient>
    <linearGradient id="lobster" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#42a5f5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>
  <!-- Terminal prompt icon -->
  <rect x="40" y="60" width="80" height="80" rx="16" fill="url(#lobster)" opacity="0.9"/>
  <text x="80" y="115" text-anchor="middle" font-family="monospace" font-size="40" font-weight="bold" fill="white">$_</text>
  <!-- Title -->
  <text x="150" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="bold" fill="white">kubectl-openclaw</text>
  <!-- Subtitle -->
  <text x="150" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8">Manage your OpenClaw agents from the terminal</text>
  <!-- Decorative line -->
  <rect x="150" y="143" width="120" height="3" rx="1.5" fill="url(#accent)"/>
  <!-- Version pill -->
  <rect x="640" y="80" width="120" height="32" rx="16" fill="url(#accent)" opacity="0.2"/>
  <text x="700" y="102" text-anchor="middle" font-family="monospace" font-size="14" fill="#42a5f5">openclaw.rocks</text>
</svg>
