name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate krew manifest
        run: |
          TAG=${{ github.ref_name }}
          cp plugins/openclaw.yaml plugins/openclaw-release.yaml
          for platform in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
            sha=$(sha256sum dist/kubectl-openclaw-${platform}.tar.gz | awk '{print $1}')
            sed -i "s|uri:.*kubectl-openclaw-${platform}.*|uri: https://github.com/openclaw-rocks/kubectl-openclaw/releases/download/${TAG}/kubectl-openclaw-${platform}.tar.gz|" plugins/openclaw-release.yaml
            sed -i "/kubectl-openclaw-${platform}/{ n; s|sha256:.*|sha256: \"${sha}\"|; }" plugins/openclaw-release.yaml
          done
          sed -i "s|version:.*|version: ${TAG}|" plugins/openclaw-release.yaml
          echo "=== Krew manifest for ${TAG} ==="
          cat plugins/openclaw-release.yaml

      - name: Upload krew manifest
        uses: softprops/action-gh-release@v2
        with:
          files: plugins/openclaw-release.yaml
